name: thepastrypath
description: Bakery Finder - discover cafes, bakeries, menus, maps, analytics, and reservations.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.3.1
  cloud_firestore: ^6.3.0
  cupertino_icons: ^1.0.8
  firebase_auth: ^6.4.0
  firebase_core: ^4.7.0
  firebase_storage: ^13.0.4
  fl_chart: ^1.1.1
  geolocator: ^11.1.0
  google_fonts: ^8.1.0
  google_maps_flutter: ^2.6.0
  intl: ^0.20.2
  provider: ^6.1.5+1
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
